<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FortiWAN-E — WAN Emulator</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <img src="/static/img/logo.svg" alt="FortiWAN-E Logo" width="36" height="36">
                <h1>FortiWAN-E</h1>
            </div>
            <span class="subtitle">WAN Emulator for SD-WAN Demos</span>
        </div>
        <div class="header-right">
            <div class="mode-toggle">
                <span class="mode-label" id="mode-label-demo">Demo</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="mode-switch">
                    <span class="toggle-slider"></span>
                </label>
                <span class="mode-label" id="mode-label-advanced">Advanced</span>
            </div>
            <div class="header-actions">
                <button type="button" class="btn btn-sm btn-secondary" id="btn-debug" title="Open Debug Console" onclick="window.open('/debug', '_blank')">Debug</button>
                <div id="connection-badge" class="badge badge-disconnected">
                    <span class="badge-dot"></span>
                    <span id="connection-text">Disconnected</span>
                    <button type="button" class="btn btn-sm btn-danger hidden" id="btn-disconnect">Disconnect</button>
                </div>
            </div>
        </div>
    </header>

    <main class="main">
        <!-- Connection Panel -->
        <section id="connect-panel" class="panel">
            <div class="panel-header">
                <h2>Connect to Fabric Studio</h2>
            </div>
            <div class="panel-body">
                <div class="studio-selector">
                    <div class="form-group">
                        <label for="studio-select">Fabric Studio Instance</label>
                        <select id="studio-select">
                            <option value="">-- Select a Studio --</option>
                        </select>
                    </div>
                    <button type="button" class="btn btn-secondary btn-sm" id="btn-add-studio">+ Add Studio</button>
                </div>
                <div id="custom-studio-input" class="form-group hidden" style="margin-top: 12px;">
                    <label for="custom-studio-host">Custom Studio Address</label>
                    <div class="custom-studio-row">
                        <input type="text" id="custom-studio-host" placeholder="studio.example.com">
                        <button type="button" class="btn btn-primary btn-sm" id="btn-use-custom">Use</button>
                        <button type="button" class="btn btn-secondary btn-sm" id="btn-cancel-custom">Cancel</button>
                    </div>
                </div>
                <form id="connect-form" class="connect-form" style="margin-top: 16px;">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="fs-host">Fabric Studio Address</label>
                            <input type="text" id="fs-host" placeholder="Select or add a studio above" required readonly>
                        </div>
                        <div class="form-group">
                            <label for="fs-user">Username</label>
                            <input type="text" id="fs-user" value="admin">
                        </div>
                        <div class="form-group">
                            <label for="fs-pass">Password</label>
                            <input type="password" id="fs-pass" placeholder="Password">
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary" id="btn-connect">Connect</button>
                        </div>
                    </div>
                    <div class="save-credentials-row">
                        <label class="checkbox-label">
                            <input type="checkbox" id="save-credentials">
                            <span>Save credentials for this studio</span>
                        </label>
                        <button type="button" class="btn btn-sm btn-secondary hidden" id="btn-delete-credentials">Delete Saved</button>
                    </div>
                </form>
            </div>
        </section>

        <!-- Fabric Selection -->
        <section id="fabric-panel" class="panel hidden">
            <div class="panel-header">
                <h2>Select Fabric</h2>
            </div>
            <div class="panel-body">
                <div class="form-group">
                    <label for="fabric-select">Fabric</label>
                    <select id="fabric-select">
                        <option value="">-- Select a Fabric --</option>
                    </select>
                </div>
                <button class="btn btn-primary" id="btn-load-topology">Load Topology</button>
            </div>
        </section>

        <!-- Topology View -->
        <section id="topology-panel" class="panel hidden">
            <div class="panel-header">
                <h2>Fabric Topology</h2>
                <span class="panel-hint">Select a router to configure WAN emulation on its interfaces</span>
            </div>
            <div class="panel-body">
                <div id="topology-diagram" class="topology-diagram"></div>
            </div>
        </section>

        <!-- WAN Emulator Controls -->
        <section id="emulator-panel" class="panel hidden">
            <div class="panel-header">
                <h2 id="emulator-title">WAN Emulation</h2>
            </div>
            <div class="panel-body">
                <!-- Interface cards with individual controls -->
                <div id="interface-cards" class="interface-cards"></div>
            </div>
        </section>

        <!-- Applied Rules Log -->
        <section id="log-panel" class="panel hidden">
            <div class="panel-header">
                <h2>Activity Log</h2>
                <button class="btn btn-sm btn-secondary" id="btn-clear-log">Clear</button>
            </div>
            <div class="panel-body">
                <div id="log-entries" class="log-entries"></div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <span>FortiWAN-E v{{ version }} — Fortinet SD-WAN Demo Tool</span>
    </footer>

    <script src="/static/js/app.js"></script>
</body>
</html>
