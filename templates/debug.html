<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FortiWAN-E — Debug Console</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
    <style>
        html, body { height: 100%; overflow: hidden; }
        body { display: flex; flex-direction: column; }
        .debug-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .debug-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .debug-header-left h1 {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent);
        }
        .debug-header-left .subtitle {
            font-size: 12px;
            color: var(--text-muted);
            border-left: 1px solid var(--border);
            padding-left: 12px;
        }
        .debug-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .debug-body {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
            font-family: 'SF Mono', 'Consolas', 'Fira Code', monospace;
            font-size: 11px;
            line-height: 1.6;
        }
        .debug-status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 16px;
            background: var(--bg-primary);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            font-size: 11px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="debug-header">
        <div class="debug-header-left">
            <h1>Debug Console</h1>
            <span class="subtitle">FortiWAN-E v{{ version }}</span>
        </div>
        <div class="debug-controls">
            <select id="debug-time-range" class="debug-select">
                <option value="5">Last 5 minutes</option>
                <option value="15" selected>Last 15 minutes</option>
                <option value="60">Last 1 hour</option>
                <option value="240">Last 4 hours</option>
                <option value="1440">Last 1 day</option>
            </select>
            <button class="btn btn-sm btn-secondary" id="btn-debug-refresh" title="Refresh">Refresh</button>
            <button class="btn btn-sm btn-secondary" id="btn-debug-copy" title="Copy to clipboard">Copy</button>
            <button class="btn btn-sm btn-secondary" id="btn-debug-export" title="Export to file">Export</button>
            <button class="btn btn-sm btn-secondary" id="btn-debug-clear">Clear</button>
        </div>
    </div>

    <div id="debug-entries" class="debug-body"></div>

    <div class="debug-status-bar">
        <span id="debug-entry-count"></span>
        <span id="debug-last-refresh"></span>
    </div>

    <script>
    /**
     * FortiWAN-E — Standalone Debug Console
     * Fetches backend logs via API and displays them.
     */

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    const $ = (sel) => document.querySelector(sel);

    async function fetchLogs(minutes) {
        try {
            const resp = await fetch(`/api/debug/logs?minutes=${minutes}`);
            const data = await resp.json();
            return data.logs || [];
        } catch (err) {
            console.error('Failed to fetch logs:', err);
            return [];
        }
    }

    function renderLogs(logs) {
        const container = $('#debug-entries');

        if (logs.length === 0) {
            container.innerHTML = '<div class="debug-empty">No debug logs in this time range.</div>';
            $('#debug-entry-count').textContent = '0 entries';
            return;
        }

        // Sort by epoch
        logs.sort((a, b) => a.epoch - b.epoch);

        const html = logs.map(e => {
            const time = new Date(e.timestamp).toLocaleTimeString('en-US', {
                hour12: false, hour: '2-digit', minute: '2-digit',
                second: '2-digit', fractionalSecondDigits: 3,
            });
            const levelClass = `debug-level-${e.level}`;
            const sourceLabel = e.source === 'backend' ? 'BE' : 'FE';
            const sourceClass = `debug-source-${e.source || 'backend'}`;
            const detailsStr = e.details
                ? `<pre class="debug-details">${escapeHtml(JSON.stringify(e.details, null, 2))}</pre>`
                : '';
            return `<div class="debug-entry ${levelClass}">
                <span class="debug-time">${time}</span>
                <span class="debug-badge ${sourceClass}">${sourceLabel}</span>
                <span class="debug-badge debug-cat">${e.category}</span>
                <span class="debug-badge ${levelClass}">${e.level.toUpperCase()}</span>
                <span class="debug-msg">${escapeHtml(e.message)}</span>
                ${detailsStr}
            </div>`;
        }).join('');

        container.innerHTML = html;
        container.scrollTop = container.scrollHeight;
        $('#debug-entry-count').textContent = `${logs.length} entries`;
    }

    async function refresh() {
        const minutes = parseInt($('#debug-time-range').value) || 15;
        const logs = await fetchLogs(minutes);
        renderLogs(logs);
        $('#debug-last-refresh').textContent = `Last refresh: ${new Date().toLocaleTimeString()}`;
    }

    async function copyLogs() {
        const minutes = parseInt($('#debug-time-range').value) || 15;
        const logs = await fetchLogs(minutes);
        const data = {
            exported_at: new Date().toISOString(),
            time_range_minutes: minutes,
            user_agent: navigator.userAgent,
            total_entries: logs.length,
            logs,
        };
        const text = JSON.stringify(data, null, 2);
        try {
            await navigator.clipboard.writeText(text);
            alert('Debug logs copied to clipboard');
        } catch (_) {
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            alert('Debug logs copied to clipboard');
        }
    }

    async function exportLogs() {
        const minutes = parseInt($('#debug-time-range').value) || 15;
        const logs = await fetchLogs(minutes);
        const data = {
            exported_at: new Date().toISOString(),
            time_range_minutes: minutes,
            user_agent: navigator.userAgent,
            total_entries: logs.length,
            logs,
        };
        const text = JSON.stringify(data, null, 2);
        const blob = new Blob([text], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
        a.download = `fortiwan-e-debug-${ts}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    async function clearLogs() {
        try {
            await fetch('/api/debug/logs', { method: 'DELETE' });
        } catch (_) {}
        await refresh();
    }

    // Event listeners
    document.addEventListener('DOMContentLoaded', () => {
        $('#btn-debug-refresh').addEventListener('click', refresh);
        $('#btn-debug-copy').addEventListener('click', copyLogs);
        $('#btn-debug-export').addEventListener('click', exportLogs);
        $('#btn-debug-clear').addEventListener('click', clearLogs);
        $('#debug-time-range').addEventListener('change', refresh);
        refresh();
    });
    </script>
</body>
</html>
