<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EE3124"/>
      <stop offset="100%" style="stop-color:#B71C1C"/>
    </linearGradient>
  </defs>
  <!-- Shield shape inspired by Fortinet -->
  <path d="M256 28 L462 120 C462 120 472 320 256 484 C40 320 50 120 50 120 Z"
        fill="url(#shieldGrad)" stroke="#8B0000" stroke-width="6"/>
  <!-- Inner border accent -->
  <path d="M256 56 L438 138 C438 138 447 310 256 456 C65 310 74 138 74 138 Z"
        fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
  <!-- Network nodes (left, center, right) -->
  <circle cx="148" cy="256" r="28" fill="white" opacity="0.95"/>
  <circle cx="256" cy="200" r="28" fill="white" opacity="0.95"/>
  <circle cx="364" cy="256" r="28" fill="white" opacity="0.95"/>
  <!-- Connection lines between nodes -->
  <line x1="174" y1="246" x2="230" y2="210" stroke="white" stroke-width="6" opacity="0.6"/>
  <line x1="282" y1="210" x2="338" y2="246" stroke="white" stroke-width="6" opacity="0.6"/>
  <!-- Wave/signal lines representing WAN emulation (latency/jitter) -->
  <path d="M140 330 Q185 290 230 330 Q275 370 320 330 Q365 290 372 330"
        fill="none" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
  <path d="M160 365 Q200 335 240 365 Q280 395 320 365 Q355 340 365 365"
        fill="none" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <!-- Small inner dots in network nodes -->
  <circle cx="148" cy="256" r="12" fill="#DA291C"/>
  <circle cx="256" cy="200" r="12" fill="#DA291C"/>
  <circle cx="364" cy="256" r="12" fill="#DA291C"/>
</svg>
