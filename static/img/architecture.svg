  <!-- Background -->
  <rect width="1200" height="760" rx="12" fill="url(#bg)"/>

  <!-- ==================== FABRIC STUDIO CONTAINER ==================== -->
  <rect x="30" y="30" width="820" height="600" rx="12" fill="url(#fsGrad)" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="30" width="820" height="34" rx="12" fill="#0f1923"/>
  <rect x="30" y="54" width="820" height="10" fill="#0f1923"/>
  <circle cx="46" cy="47" r="4" fill="#da291c"/>
  <circle cx="60" cy="47" r="4" fill="#f0883e"/>
  <circle cx="74" cy="47" r="4" fill="#3fb950"/>
  <text x="96" y="52" fill="#58a6ff" font-size="13" font-weight="600" letter-spacing="1">FABRIC STUDIO — sd-wan 7.6</text>
  <text x="820" y="52" fill="#484f58" font-size="10" text-anchor="end">10.254.254.254</text>

  <!-- INET (top) -->
  <use href="#iconRouter" x="400" y="95" width="60" height="60"/>
  <text x="430" y="170" text-anchor="middle" fill="#f0f6fc" font-size="12" font-weight="600">INET</text>

  <!-- ISP-A and ISP-B -->
  <use href="#iconSwitch" x="270" y="210" width="60" height="60"/>
  <rect x="278" y="274" width="44" height="16" rx="3" fill="#0f1923"/>
  <text x="300" y="286" text-anchor="middle" fill="#f0f6fc" font-size="12" font-weight="600">ISP-A</text>

  <use href="#iconSwitch" x="530" y="210" width="60" height="60"/>
  <rect x="538" y="274" width="44" height="16" rx="3" fill="#0f1923"/>
  <text x="560" y="286" text-anchor="middle" fill="#f0f6fc" font-size="12" font-weight="600">ISP-B</text>

  <!-- FMG / FAZ on the left -->
  <use href="#iconFMG" x="80" y="210" width="60" height="60"/>
  <text x="110" y="285" text-anchor="middle" fill="#f0f6fc" font-size="12" font-weight="600">FMG</text>

  <use href="#iconFAZ" x="80" y="310" width="60" height="60"/>
  <text x="110" y="385" text-anchor="middle" fill="#f0f6fc" font-size="12" font-weight="600">FAZ</text>

  <!-- Core-to-ISP links -->
  <line x1="430" y1="155" x2="300" y2="210" stroke="#58a6ff" stroke-width="1.6" opacity="0.75"/>
  <line x1="430" y1="155" x2="560" y2="210" stroke="#58a6ff" stroke-width="1.6" opacity="0.75"/>
  <line x1="140" y1="240" x2="270" y2="240" stroke="#58a6ff" stroke-width="1.4" opacity="0.6"/>
  <line x1="140" y1="340" x2="270" y2="255" stroke="#58a6ff" stroke-width="1.4" opacity="0.6"/>

  <!-- ==================== FORTIGATES ROW ==================== -->
  <!-- HUB1 HUB2 BR1 BR2 BR3 evenly spaced between x=90 and x=800 -->
  <!-- Each icon 60px wide, name centered below -->

  <!-- FGT-HUB1 -->
  <use href="#iconFGT" x="100" y="410" width="60" height="60"/>
  <text x="130" y="485" text-anchor="middle" fill="#f0f6fc" font-size="11" font-weight="600">FGT-HUB1</text>

  <!-- FGT-HUB2 -->
  <use href="#iconFGT" x="250" y="410" width="60" height="60"/>
  <text x="280" y="485" text-anchor="middle" fill="#f0f6fc" font-size="11" font-weight="600">FGT-HUB2</text>

  <!-- FGT-BR1 -->
  <use href="#iconFGT" x="400" y="410" width="60" height="60"/>
  <text x="430" y="485" text-anchor="middle" fill="#f0f6fc" font-size="11" font-weight="600">FGT-BR1</text>

  <!-- FGT-BR2 -->
  <use href="#iconFGT" x="550" y="410" width="60" height="60"/>
  <text x="580" y="485" text-anchor="middle" fill="#f0f6fc" font-size="11" font-weight="600">FGT-BR2</text>

  <!-- FGT-BR3 -->
  <use href="#iconFGT" x="700" y="410" width="60" height="60"/>
  <text x="730" y="485" text-anchor="middle" fill="#f0f6fc" font-size="11" font-weight="600">FGT-BR3</text>

  <!-- Role badges -->
  <rect x="107" y="388" width="46" height="16" rx="8" fill="#1f3a5f" stroke="#58a6ff" stroke-width="0.8"/>
  <text x="130" y="399" text-anchor="middle" fill="#58a6ff" font-size="9" font-weight="600">Hub</text>
  <rect x="257" y="388" width="46" height="16" rx="8" fill="#1f3a5f" stroke="#58a6ff" stroke-width="0.8"/>
  <text x="280" y="399" text-anchor="middle" fill="#58a6ff" font-size="9" font-weight="600">Hub</text>
  <rect x="407" y="388" width="46" height="16" rx="8" fill="#5a3a18" stroke="#f0883e" stroke-width="0.8"/>
  <text x="430" y="399" text-anchor="middle" fill="#f0883e" font-size="9" font-weight="600">Branch</text>
  <rect x="557" y="388" width="46" height="16" rx="8" fill="#5a3a18" stroke="#f0883e" stroke-width="0.8"/>
  <text x="580" y="399" text-anchor="middle" fill="#f0883e" font-size="9" font-weight="600">Branch</text>
  <rect x="707" y="388" width="46" height="16" rx="8" fill="#5a3a18" stroke="#f0883e" stroke-width="0.8"/>
  <text x="730" y="399" text-anchor="middle" fill="#f0883e" font-size="9" font-weight="600">Branch</text>

  <!-- ISP-A (port2) links — red-tinted -->
  <g stroke="#da291c" stroke-width="1.3" opacity="0.55" fill="none">
    <line x1="300" y1="270" x2="130" y2="410"/>
    <line x1="300" y1="270" x2="280" y2="410"/>
    <line x1="300" y1="270" x2="430" y2="410"/>
    <line x1="300" y1="270" x2="580" y2="410"/>
    <line x1="300" y1="270" x2="730" y2="410"/>
  </g>

  <!-- ISP-B (port3) links — orange-tinted -->
  <g stroke="#f0883e" stroke-width="1.3" opacity="0.55" fill="none">
    <line x1="560" y1="270" x2="130" y2="410"/>
    <line x1="560" y1="270" x2="280" y2="410"/>
    <line x1="560" y1="270" x2="430" y2="410"/>
    <line x1="560" y1="270" x2="580" y2="410"/>
    <line x1="560" y1="270" x2="730" y2="410"/>
  </g>

  <!-- ==================== PCs ROW ==================== -->
  <use href="#iconPC" x="100" y="510" width="60" height="60"/>
  <text x="130" y="585" text-anchor="middle" fill="#8b949e" font-size="11">PC-HUB1</text>

  <use href="#iconPC" x="250" y="510" width="60" height="60"/>
  <text x="280" y="585" text-anchor="middle" fill="#8b949e" font-size="11">PC-HUB2</text>

  <use href="#iconPC" x="400" y="510" width="60" height="60"/>
  <text x="430" y="585" text-anchor="middle" fill="#8b949e" font-size="11">PC-BR1</text>

  <use href="#iconPC" x="550" y="510" width="60" height="60"/>
  <text x="580" y="585" text-anchor="middle" fill="#8b949e" font-size="11">PC-BR2</text>

  <!-- PC connections (LAN side) -->
  <g stroke="#484f58" stroke-width="1.1" stroke-dasharray="3,3" opacity="0.8">
    <line x1="130" y1="495" x2="130" y2="510"/>
    <line x1="280" y1="495" x2="280" y2="510"/>
    <line x1="430" y1="495" x2="430" y2="510"/>
    <line x1="580" y1="495" x2="580" y2="510"/>
  </g>

  <!-- Legend inside Fabric Studio -->
  <g transform="translate(620, 520)">
    <rect x="0" y="0" width="210" height="90" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <text x="12" y="18" fill="#58a6ff" font-size="10" font-weight="600">LEGEND</text>
    <line x1="12" y1="34" x2="34" y2="34" stroke="#da291c" stroke-width="1.6" opacity="0.8"/>
    <text x="42" y="37" fill="#8b949e" font-size="10">ISP-A (port2)</text>
    <line x1="12" y1="52" x2="34" y2="52" stroke="#f0883e" stroke-width="1.6" opacity="0.8"/>
    <text x="42" y="55" fill="#8b949e" font-size="10">ISP-B (port3)</text>
    <line x1="12" y1="70" x2="34" y2="70" stroke="#58a6ff" stroke-width="1.6" opacity="0.8"/>
    <text x="42" y="73" fill="#8b949e" font-size="10">Transit / Uplink</text>
  </g>

  <!-- ==================== FORTIWAN-E BOX ==================== -->
  <rect x="890" y="90" width="280" height="150" rx="12" fill="url(#fweGrad)" stroke="#da291c" stroke-width="2" filter="url(#shadow)"/>
  <rect x="892" y="92" width="276" height="146" rx="11" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <use href="#iconLaptop" x="905" y="110" width="48" height="48"/>
  <text x="965" y="135" fill="#ffffff" font-size="18" font-weight="700">FortiWAN-E</text>
  <text x="965" y="155" fill="rgba(255,255,255,0.75)" font-size="11">WAN Emulator</text>
  <line x1="910" y1="180" x2="1150" y2="180" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="910" y="200" fill="rgba(255,255,255,0.85)" font-size="11">• Debian / Ubuntu / Docker</text>
  <text x="910" y="220" fill="rgba(255,255,255,0.85)" font-size="11">• Flask • HTTPS :443</text>

  <!-- ==================== ADMIN / BROWSER ==================== -->
  <rect x="890" y="280" width="280" height="110" rx="12" fill="url(#devGrad)" stroke="#58a6ff" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="930" cy="320" r="14" fill="none" stroke="#58a6ff" stroke-width="1.4"/>
  <line x1="930" y1="306" x2="930" y2="334" stroke="#58a6ff" stroke-width="1"/>
  <line x1="916" y1="320" x2="944" y2="320" stroke="#58a6ff" stroke-width="1"/>
  <path d="M918 314 Q930 322 942 314" stroke="#58a6ff" stroke-width="1" fill="none"/>
  <path d="M918 326 Q930 318 942 326" stroke="#58a6ff" stroke-width="1" fill="none"/>
  <text x="960" y="315" fill="#f0f6fc" font-size="14" font-weight="600">Admin</text>
  <text x="960" y="334" fill="#8b949e" font-size="11">Web Browser</text>
  <text x="905" y="370" fill="#8b949e" font-size="10">Connects to FortiWAN-E UI over HTTPS</text>

  <!-- ==================== CONNECTION ARROWS ==================== -->
  <!-- Fabric Studio <-> FortiWAN-E (REST API) -->
  <text x="869" y="118" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="600">REST API</text>
  <line x1="852" y1="140" x2="886" y2="140" stroke="#58a6ff" stroke-width="2.2" marker-end="url(#arrow)"/>
  <line x1="886" y1="160" x2="852" y2="160" stroke="#3fb950" stroke-width="2.2" marker-end="url(#arrowGreen)"/>
  <text x="869" y="185" text-anchor="middle" fill="#8b949e" font-size="9">HTTPS</text>

  <!-- Admin -> FortiWAN-E -->
  <line x1="1030" y1="280" x2="1030" y2="242" stroke="#58a6ff" stroke-width="1.8" marker-end="url(#arrow)"/>
  <rect x="1040" y="252" width="78" height="16" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="0.8"/>
  <text x="1079" y="263" text-anchor="middle" fill="#58a6ff" font-size="9" font-weight="600">HTTPS :443</text>

  <!-- ==================== WAN EMULATION STRIP ==================== -->
  <rect x="30" y="660" width="1140" height="80" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="50" y="688" fill="#58a6ff" font-size="12" font-weight="600">WAN EMULATION PARAMETERS</text>
  <text x="50" y="720" fill="#484f58" font-size="10">Applied as Linux tc qdiscs on Router interfaces via the Fabric Studio REST API</text>

  <!-- Parameter pills -->
  <g font-size="11" font-weight="600">
    <rect x="270" y="674" width="74" height="26" rx="13" fill="#1a2332" stroke="#30363d" stroke-width="0.8"/>
    <text x="307" y="691" text-anchor="middle" fill="#8b949e">Delay</text>

    <rect x="354" y="674" width="74" height="26" rx="13" fill="#1a2332" stroke="#30363d" stroke-width="0.8"/>
    <text x="391" y="691" text-anchor="middle" fill="#8b949e">Jitter</text>

    <rect x="438" y="674" width="74" height="26" rx="13" fill="#1a2332" stroke="#30363d" stroke-width="0.8"/>
    <text x="475" y="691" text-anchor="middle" fill="#8b949e">Loss</text>

    <rect x="522" y="674" width="94" height="26" rx="13" fill="#1a2332" stroke="#30363d" stroke-width="0.8"/>
    <text x="569" y="691" text-anchor="middle" fill="#8b949e">Bandwidth</text>

    <rect x="626" y="674" width="84" height="26" rx="13" fill="#1a2332" stroke="#30363d" stroke-width="0.8"/>
    <text x="668" y="691" text-anchor="middle" fill="#8b949e">Corrupt</text>

    <rect x="720" y="674" width="90" height="26" rx="13" fill="#1a2332" stroke="#30363d" stroke-width="0.8"/>
    <text x="765" y="691" text-anchor="middle" fill="#8b949e">Duplicate</text>

    <rect x="820" y="674" width="84" height="26" rx="13" fill="#1a2332" stroke="#30363d" stroke-width="0.8"/>
    <text x="862" y="691" text-anchor="middle" fill="#8b949e">Reorder</text>
  </g>
</svg>
