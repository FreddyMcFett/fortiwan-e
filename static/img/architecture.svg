    <symbol id="iconPC" viewBox="0 0 48 48">
      <rect x="8" y="12" width="32" height="20" rx="1" fill="#1a2332" stroke="#8b949e" stroke-width="1.2"/>
      <rect x="10" y="14" width="28" height="16" fill="#0d1117"/>
      <rect x="4" y="32" width="40" height="4" rx="1" fill="#2a3a4f" stroke="#8b949e" stroke-width="1"/>
      <rect x="22" y="16" width="4" height="3" fill="#3fb950" opacity="0.6"/>
    </symbol>
    <symbol id="iconFMG" viewBox="0 0 48 48">
      <rect x="6" y="16" width="36" height="22" rx="2" fill="#1a2332" stroke="#8b949e" stroke-width="1.2"/>
      <rect x="9" y="20" width="30" height="4" fill="#0d1117"/>
      <rect x="9" y="26" width="30" height="4" fill="#0d1117"/>
      <circle cx="12" cy="22" r="0.8" fill="#3fb950"/>
      <circle cx="12" cy="28" r="0.8" fill="#3fb950"/>
      <rect x="34" y="19" width="3" height="2" fill="#da291c"/>
    </symbol>
    <symbol id="iconFAZ" viewBox="0 0 48 48">
      <ellipse cx="24" cy="18" rx="18" ry="5" fill="#1a2332" stroke="#8b949e" stroke-width="1.2"/>
      <path d="M6 18 L6 32 A18 5 0 0 0 42 32 L42 18" fill="#1a2332" stroke="#8b949e" stroke-width="1.2"/>
      <path d="M24 18 L24 32" stroke="#8b949e" stroke-width="0.8" stroke-dasharray="2,2"/>
      <path d="M20 22 L28 22 L24 30 Z" fill="#3fb950" opacity="0.8"/>
    </symbol>
    <symbol id="iconLaptop" viewBox="0 0 48 48">
      <path d="M10 14 L38 14 L40 32 L8 32 Z" fill="#1a2332" stroke="#da291c" stroke-width="1.3"/>
      <rect x="12" y="16" width="24" height="14" fill="#0d1117"/>
      <path d="M4 34 L44 34 L42 38 L6 38 Z" fill="#2a3a4f" stroke="#da291c" stroke-width="1.2"/>
      <rect x="20" y="19" width="8" height="2" fill="#da291c" opacity="0.6"/>
      <rect x="18" y="23" width="12" height="1" fill="#3fb950" opacity="0.5"/>
      <rect x="18" y="26" width="12" height="1" fill="#3fb950" opacity="0.5"/>
    </symbol>
