<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="fsGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2332"/>
      <stop offset="100%" style="stop-color:#0f1923"/>
    </linearGradient>
    <linearGradient id="fweGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#da291c"/>
      <stop offset="100%" style="stop-color:#a01a12"/>
    </linearGradient>
    <linearGradient id="devGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#243447"/>
      <stop offset="100%" style="stop-color:#1a2736"/>
    </linearGradient>
    <linearGradient id="hubGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1f3a5f"/>
      <stop offset="100%" style="stop-color:#162a45"/>
    </linearGradient>
    <linearGradient id="brGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5a3a18"/>
      <stop offset="100%" style="stop-color:#3e2810"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>

    <!-- Reusable icons -->
    <symbol id="iconRouter" viewBox="0 0 48 48">
      <ellipse cx="24" cy="30" rx="20" ry="8" fill="#2a3a4f" stroke="#58a6ff" stroke-width="1.2"/>
      <ellipse cx="24" cy="24" rx="20" ry="8" fill="#334863" stroke="#58a6ff" stroke-width="1.2"/>
      <path d="M14 24 L10 16 M20 22 L18 12 M28 22 L30 12 M34 24 L38 16" stroke="#58a6ff" stroke-width="1.4" fill="none" stroke-linecap="round"/>
      <polygon points="10,16 8,18 12,18" fill="#58a6ff"/>
      <polygon points="18,12 16,14 20,14" fill="#58a6ff"/>
      <polygon points="30,12 28,14 32,14" fill="#58a6ff"/>
      <polygon points="38,16 36,18 40,18" fill="#58a6ff"/>
    </symbol>
    <symbol id="iconSwitch" viewBox="0 0 48 48">
      <ellipse cx="24" cy="30" rx="20" ry="7" fill="#2a3a4f" stroke="#8b949e" stroke-width="1.2"/>
      <ellipse cx="24" cy="24" rx="20" ry="7" fill="#334863" stroke="#8b949e" stroke-width="1.2"/>
      <path d="M14 20 L22 20 M26 20 L34 20" stroke="#8b949e" stroke-width="1.4" fill="none"/>
      <polygon points="14,20 16,18 16,22" fill="#8b949e"/>
      <polygon points="22,20 20,18 20,22" fill="#8b949e"/>
      <path d="M14 28 L22 28 M26 28 L34 28" stroke="#8b949e" stroke-width="1.4" fill="none"/>
      <polygon points="34,28 32,26 32,30" fill="#8b949e"/>
      <polygon points="26,28 28,26 28,30" fill="#8b949e"/>
    </symbol>
    <symbol id="iconFGT" viewBox="0 0 48 48">
      <rect x="4" y="14" width="40" height="20" rx="2" fill="#1a2332" stroke="#da291c" stroke-width="1.4"/>
      <rect x="4" y="14" width="40" height="6" fill="#da291c"/>
      <circle cx="10" cy="17" r="1.2" fill="#ffffff"/>
      <rect x="8" y="24" width="6" height="3" fill="#3fb950"/>
      <rect x="16" y="24" width="6" height="3" fill="#3fb950"/>
      <rect x="24" y="24" width="6" height="3" fill="#484f58"/>
      <rect x="32" y="24" width="6" height="3" fill="#484f58"/>
      <text x="24" y="32" text-anchor="middle" fill="#da291c" font-size="5" font-weight="700" font-family="Arial">FGT</text>
    </symbol>
    <symbol id="iconHub" viewBox="0 0 48 48">
      <rect x="10" y="8" width="28" height="8" rx="1" fill="#1a2332" stroke="#58a6ff" stroke-width="1.2"/>
      <rect x="10" y="18" width="28" height="8" rx="1" fill="#1a2332" stroke="#58a6ff" stroke-width="1.2"/>
      <rect x="10" y="28" width="28" height="8" rx="1" fill="#1a2332" stroke="#58a6ff" stroke-width="1.2"/>
      <circle cx="14" cy="12" r="1" fill="#3fb950"/>
      <circle cx="14" cy="22" r="1" fill="#3fb950"/>
      <circle cx="14" cy="32" r="1" fill="#3fb950"/>
      <rect x="20" y="11" width="14" height="2" fill="#58a6ff" opacity="0.5"/>
      <rect x="20" y="21" width="14" height="2" fill="#58a6ff" opacity="0.5"/>
      <rect x="20" y="31" width="14" height="2" fill="#58a6ff" opacity="0.5"/>
    </symbol>
    <symbol id="iconBranch" viewBox="0 0 48 48">
      <rect x="8" y="10" width="32" height="30" fill="#1a2332" stroke="#f0883e" stroke-width="1.2"/>
      <rect x="12" y="14" width="5" height="5" fill="#f0883e" opacity="0.6"/>
      <rect x="21" y="14" width="5" height="5" fill="#f0883e" opacity="0.6"/>
      <rect x="30" y="14" width="5" height="5" fill="#f0883e" opacity="0.6"/>
      <rect x="12" y="22" width="5" height="5" fill="#f0883e" opacity="0.6"/>
      <rect x="21" y="22" width="5" height="5" fill="#f0883e" opacity="0.6"/>
      <rect x="30" y="22" width="5" height="5" fill="#f0883e" opacity="0.6"/>
      <rect x="20" y="30" width="8" height="10" fill="#0d1117" stroke="#f0883e" stroke-width="0.8"/>
